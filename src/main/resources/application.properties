# ==================== AstroVoluntário - Configuração Principal ====================
spring.application.name=astro-voluntario

# ====================== Banco de Dados PostgreSQL ======================
# Use variáveis de ambiente (NÃO COLOQUE SENHAS AQUI!)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/astrovoluntario}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# ====================== JPA / Hibernate ======================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ====================== Flyway (Migrações) ======================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ====================== Logging ======================
logging.level.org.springframework.web=INFO
logging.level.com.astrovoluntario=INFO

# ====================== OpenAPI / Swagger ======================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html